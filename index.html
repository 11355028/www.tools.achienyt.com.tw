<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿簽日期與時間工具</title>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --input-border: #ccd1d9;
            --accent-color: #3498db;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 深色模式支援 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --container-bg: #2d2d2d;
                --text-color: #ecf0f1;
                --input-border: #444;
                --accent-color: #5dade2;
                --shadow: 0 4px 20px rgba(0,0,0,0.3);
            }
        }

        /* 手動切換樣式 */
        body.light-theme {
            --bg-color: #f5f7fa;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
        }
        body.dark-theme {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #ecf0f1;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: 0.3s;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: var(--container-bg);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h2 { border-left: 5px solid var(--accent-color); padding-left: 15px; margin: 0 0 15px 0; font-size: 1.3rem; }
        
        /* 現在時刻樣式 */
        #currentTimePanel { text-align: center; }
        .clock { font-family: 'Courier New', monospace; font-size: 1.8rem; font-weight: bold; color: var(--accent-color); margin-top: 5px; }

        select, input, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--container-bg);
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:active { transform: scale(0.98); }

        /* 倒數區塊 */
        #newYearSection {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            display: none;
        }

        .timer-display {
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            color: #ffd700;
        }

        .sub-timer { font-size: 1rem; color: #ddd; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; line-height: 1.6; }

        /* 右下角管理按鈕 */
        #adminBtn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: auto;
            padding: 6px 12px;
            font-size: 11px;
            background: #95a5a6;
            opacity: 0.4;
            z-index: 100;
            border-radius: 4px;
        }
        #adminBtn:hover { opacity: 1; }

        .theme-toggle { width: auto; font-size: 0.8rem; padding: 6px 15px; background: #7f8c8d; margin-bottom: 15px; }

        #testPanel { display: none; background: #fff3cd; color: #856404; border: 1px dashed #ffeeba; text-align: center; }
        .result { margin-top: 15px; text-align: center; font-weight: bold; color: var(--accent-color); font-size: 1.2rem; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">切換主題顏色</button>

    <div class="container" id="currentTimePanel">
        <div style="font-size: 0.9rem; opacity: 0.8;">現在時刻</div>
        <div id="liveClock" class="clock">00:00:00</div>
        <div id="liveDate" style="font-size: 0.9rem; margin-top: 5px;">2026年01月01日</div>
    </div>

    <div id="testPanel" class="container">
        <p><strong>🛠️ 模擬測試面板</strong></p>
        <button style="width:auto; padding:5px 10px;" onclick="setMock(12, 28)">模擬 12/28</button>
        <button style="width:auto; padding:5px 10px;" onclick="setMock(12, 31)">模擬 12/31</button>
        <button style="width:auto; padding:5px 10px;" onclick="setMock(null, null)">恢復正常</button>
    </div>

    <div id="newYearSection" class="container">
        <h2 style="color:white; border-color:#e74c3c;">🎊 新年倒數計時</h2>
        <div id="countdownDisplay" class="timer-display">--</div>
    </div>

    <div class="container">
        <h2>📅 日期差距計算</h2>
        <select id="quickSelect" onchange="applyQuickSelect()">
            <option value="">-- 快速選擇大考日期 --</option>
            <optgroup label="✨ 節慶" id="opt-holiday"></optgroup>
            <optgroup label="📝 國中會考" id="opt-cap"></optgroup>
            <optgroup label="🎓 大學學測" id="opt-gsat"></optgroup>
            <optgroup label="🧪 分科測驗" id="opt-ast"></optgroup>
        </select>
        <div style="margin-top:10px;">
            <label style="font-size: 0.8rem;">開始日期：</label>
            <input type="date" id="startDate">
        </div>
        <div style="margin-top:10px;">
            <label style="font-size: 0.8rem;">結束日期：</label>
            <input type="date" id="endDate">
        </div>
        <button onclick="calculateDiff()">計算天數</button>
        <div id="dateResult" class="result"></div>
    </div>

    <button id="adminBtn" onclick="askPassword()">Admin</button>

    <script>
        let mockM = null; let mockD = null;

        // 更新即時時鐘
        function updateLiveClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const y = now.getFullYear();
            const mo = now.getMonth() + 1;
            const d = now.getDate();
            
            document.getElementById('liveClock').innerText = `${h}:${m}:${s}`;
            document.getElementById('liveDate').innerText = `${y}年${mo}月${d}日`;
        }

        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('dark-theme')) body.classList.replace('dark-theme', 'light-theme');
            else if (body.classList.contains('light-theme')) body.classList.replace('light-theme', 'dark-theme');
            else body.classList.add(window.matchMedia("(prefers-color-scheme: dark)").matches ? 'light-theme' : 'dark-theme');
        }

        function askPassword() {
            if (prompt("輸入管理密碼：") === "27322935") {
                document.getElementById('testPanel').style.display = "block";
            } else { alert("密碼錯誤"); }
        }

        function setMock(m, d) { mockM = m; mockD = d; updateCountdown(); }

        function getNextDOW(y, m, d, dow) {
            let dt = new Date(y, m - 1, d);
            while (dt.getDay() !== dow) dt.setDate(dt.getDate() + 1);
            return dt;
        }

        function initSelect() {
            const today = new Date();
            const year = today.getFullYear();
            const groups = {
                'holiday': { el: document.getElementById('opt-holiday'), dates: [{n:`${year+1} 元旦`, d:new Date(year+1, 0, 1)}] },
                'cap': { el: document.getElementById('opt-cap'), dates: [] },
                'gsat': { el: document.getElementById('opt-gsat'), dates: [] },
                'ast': { el: document.getElementById('opt-ast'), dates: [] }
            };
            for (let i = 0; i < 3; i++) {
                let y = year + i;
                groups.cap.dates.push({n:`${y} 會考`, d:getNextDOW(y, 5, 15, 6)});
                groups.gsat.dates.push({n:`${y} 學測`, d:getNextDOW(y, 1, 15, 5)});
                groups.ast.dates.push({n:`${y} 分科`, d:new Date(y, 6, 12)});
            }
            Object.keys(groups).forEach(k => {
                groups[k].dates.forEach(item => {
                    if (item.d >= today.setHours(0,0,0,0)) {
                        const ds = item.d.toISOString().split('T')[0];
                        groups[k].el.appendChild(new Option(`${item.n} (${ds})`, ds));
                    }
                });
            });
        }

        function updateCountdown() {
            const now = new Date();
            const m_now = mockM || (now.getMonth() + 1);
            const d_now = mockD || now.getDate();
            const section = document.getElementById('newYearSection');
            const display = document.getElementById('countdownDisplay');

            if (m_now === 12 && d_now >= 25) {
                section.style.display = "block";
                const nextYear = new Date(now.getFullYear() + 1, 0, 1);
                const diffMs = nextYear - now;
                
                const totalS = Math.floor(diffMs / 1000);
                const totalM = Math.floor(totalS / 60);
                const totalH = Math.floor(totalS / 3600);
                
                const d = Math.floor(totalS / 86400);
                const m_rem = Math.floor((totalS % 3600) / 60);
                const s_rem = totalS % 60;

                if (d_now === 31) {
                    display.innerHTML = `
                        <div style="font-size: 2.2rem;">${totalS.toLocaleString()} <small>秒</small></div>
                        <div class="sub-timer">⌛ 總累積：${totalM.toLocaleString()} 分 ${s_rem} 秒</div>
                        <div class="sub-timer">🕒 總累積：${totalH.toLocaleString()} 時 ${m_rem} 分 ${s_rem} 秒</div>
                    `;
                } else {
                    const h_rem = Math.floor((totalS % 86400) / 3600);
                    display.innerHTML = `
                        <div style="font-size: 2rem;">${d}天 ${h_rem}時 ${m_rem}分</div>
                        <div style="font-size: 0.9rem; color: #eee; margin-top:5px;">累積約 ${totalH.toLocaleString()} 小時</div>
                    `;
                }
            } else {
                section.style.display = "none";
            }
        }

        function calculateDiff() {
            const start = new Date(document.getElementById('startDate').value);
            const end = new Date(document.getElementById('endDate').value);
            if (isNaN(start) || isNaN(end)) return;
            const diff = Math.ceil((end - start) / 86400000);
            document.getElementById('dateResult').innerHTML = diff >= 0 ? `還有 ${diff} 天` : `已過 ${Math.abs(diff)} 天`;
        }

        function applyQuickSelect() {
            const val = document.getElementById('quickSelect').value;
            if(val) { document.getElementById('endDate').value = val; calculateDiff(); }
        }

        // 初始化
        document.getElementById('startDate').valueAsDate = new Date();
        initSelect();
        
        // 設定每秒更新
        setInterval(() => {
            updateLiveClock();
            updateCountdown();
        }, 1000);
        
        updateLiveClock();
        updateCountdown();
    </script>
</body>
</html>
